<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBTI 人格测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif; min-height: 100vh; }
    
    /* 背景 */
    .bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
      background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
      background-size: 400% 400%; animation: gradientBG 15s ease infinite; }
    @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    
    .container { max-width: 700px; margin: 0 auto; padding: 20px; }
    .card { background: rgba(255,255,255,0.95); border-radius: 20px; padding: 30px; margin: 15px 0; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
    
    .screen { display: none; }
    .screen.active { display: block; }
    
    /* 首页 */
    .intro h1 { font-size: 40px; text-align: center; margin-bottom: 15px;
      background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .intro p { text-align: center; color: #666; margin-bottom: 25px; }
    
    .btn { display: inline-block; padding: 14px 28px; font-size: 16px; font-weight: bold; border: none; border-radius: 25px; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.4); }
    .btn-secondary { background: white; color: #667eea; border: 2px solid #667eea; }
    .btn-secondary:hover { background: #f8f8ff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    
    .btn-center { display: block; width: 180px; margin: 0 auto; text-align: center; }
    
    /* 进度 */
    .progress-wrap { margin-bottom: 15px; }
    .progress-bar { height: 8px; background: #e0e0e0; border-radius: 10px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 10px; transition: width 0.3s; }
    .progress-text { text-align: center; color: #666; font-size: 13px; margin-top: 8px; }
    
    /* 导航点 */
    .dots { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 20px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; cursor: pointer; transition: all 0.2s; }
    .dot.current { background: #667eea; transform: scale(1.4); }
    .dot.done { background: #4CAF50; }
    
    /* 题目 */
    .question-wrap { overflow: hidden; }
    .question-track { display: flex; transition: transform 0.4s ease; }
    .question-slide { min-width: 100%; }
    
    .q-num { display: inline-block; padding: 5px 12px; background: #f0f0f0; border-radius: 15px; font-size: 12px; color: #667eea; font-weight: bold; margin-bottom: 12px; }
    .q-text { font-size: 17px; line-height: 1.7; color: #333; margin-bottom: 20px; white-space: pre-wrap; }
    
    .option { padding: 14px 16px; margin-bottom: 10px; background: white; border: 2px solid #e0e0e0; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s; }
    .option:hover { border-color: #667eea; background: #fafaff; }
    .option.on { border-color: #667eea; background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.08)); }
    .opt-code { width: 26px; height: 26px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-weight: bold; color: #667eea; font-size: 12px; flex-shrink: 0; }
    .option.on .opt-code { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .opt-text { font-size: 14px; color: #333; }
    
    .nav-btns { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
    .nav-btn { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ddd; background: white; cursor: pointer; font-size: 16px; transition: all 0.2s; }
    .nav-btn:hover:not(:disabled) { border-color: #667eea; color: #667eea; }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .hint { color: #999; font-size: 12px; }
    
    /* 结果 */
    .result-head { text-align: center; padding-bottom: 20px; border-bottom: 1px solid #eee; margin-bottom: 20px; }
    .result-img { width: 160px; height: 160px; object-fit: cover; border-radius: 16px; margin-bottom: 15px; box-shadow: 0 6px 25px rgba(0,0,0,0.12); }
    .result-code { font-size: 42px; font-weight: bold; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
    .result-cn { font-size: 22px; color: #666; margin-bottom: 12px; }
    .result-badge { display: inline-block; padding: 8px 16px; background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1)); border-radius: 20px; font-weight: bold; color: #667eea; font-size: 13px; }
    
    .section { margin-bottom: 20px; }
    .section h3 { font-size: 15px; color: #667eea; margin-bottom: 10px; }
    .section p { font-size: 14px; line-height: 1.8; color: #444; white-space: pre-wrap; }
    
    .dim-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 8px; }
    .dim-item { padding: 10px; background: #f8f8f8; border-radius: 8px; }
    .dim-name { font-size: 11px; font-weight: bold; color: #333; }
    .dim-score { font-size: 11px; color: #667eea; font-weight: bold; margin: 4px 0; }
    .dim-desc { font-size: 10px; color: #666; line-height: 1.4; }
    
    .note { padding: 12px; background: #fff8e1; border-radius: 10px; border: 1px solid #ffc107; }
    .note h3 { color: #e65100; }
    .note p { color: #bf360c; font-size: 12px; }
    
    .footer { text-align: center; margin-top: 20px; color: rgba(255,255,255,0.8); font-size: 12px; }
    .footer a { color: white; }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="container">
    
    <!-- 首页 -->
    <div id="screen-intro" class="screen active">
      <div class="card intro">
        <h1>MBTI已经过时<br>SBTI来了</h1>
        <p>31道题，5分钟<br>测出你的赛博人格</p>
        <button class="btn btn-primary btn-center" id="btn-start">开始测试</button>
      </div>
      <div class="footer">原作者：<a href="https://space.bilibili.com/417038183">B站@蛆肉儿串儿</a></div>
    </div>
    
    <!-- 测试 -->
    <div id="screen-test" class="screen">
      <div class="card">
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
          <div class="progress-text" id="progress-text">0 / 31</div>
        </div>
        <div class="dots" id="dots"></div>
        <div class="question-wrap">
          <div class="question-track" id="q-track"></div>
        </div>
        <div class="nav-btns">
          <button class="nav-btn" id="btn-prev" disabled>←</button>
          <span class="hint" id="hint">选择后自动跳转</span>
          <button class="nav-btn" id="btn-next" disabled>→</button>
        </div>
        <div style="text-align:center; margin-top:20px;">
          <button class="btn btn-secondary" id="btn-back">返回首页</button>
          <button class="btn btn-primary" id="btn-submit" disabled>查看结果</button>
        </div>
      </div>
    </div>
    
    <!-- 结果 -->
    <div id="screen-result" class="screen">
      <div class="card">
        <div class="result-head">
          <img id="r-img" class="result-img" alt="">
          <div class="result-code" id="r-code">CTRL</div>
          <div class="result-cn" id="r-cn">拿捏者</div>
          <div class="result-badge" id="r-badge">匹配度 92%</div>
        </div>
        <div class="section"><p id="r-intro" style="text-align:center;"></p></div>
        <div class="section"><h3>人格解读</h3><p id="r-desc"></p></div>
        <div class="section"><h3>十五维度评分</h3><div class="dim-grid" id="r-dims"></div></div>
        <div class="section note"><h3>友情提示</h3><p id="r-note">本测试仅供娱乐，别太当真。</p></div>
        <div style="text-align:center; margin-top:20px;">
          <button class="btn btn-secondary" id="btn-restart">重新测试</button>
          <button class="btn btn-primary" id="btn-home">回到首页</button>
        </div>
      </div>
    </div>
    
  </div>

{code:"FAKE",p:"HLM-MML-MLM-MLM-HLH"},{code:"OJBK",p:"MMH-MMM-HML-LMM-MML"},

{code:"WOC!",p:"HHL-HMH-MMH-HHM-LHH"},{code:"THIN-K",p:"HHL-HMH-MLH-MHM-LHH"},

var DIMEXP = {

S2:{L:"内心频道雪花较多",M:"平时还能认出自己",H:"对自己的脾气、欲望和底线都算门儿清"},

A3:{L:"意义感偏低",M:"偶尔有目标，偶尔也想摆烂",H:"做事更有方向"},

So1:{L:"社交启动慢热",M:"有人来就接，没人来也不硬凑",H:"更愿意主动打开场子"},
So2:{L:"关系里更想亲近和融合",M:"既想亲近又想留缝",H:"边界感偏强"},
So3:{L:"表达更直接",M:"会看气氛说话",H:"对不同场景的自我切换更熟练"}
};

var DIMORDER = ['S1','S2','S3','E1','E2','E3','A1','A2','A3','Ac1','Ac2','Ac3','So1','So2','So3'];

// 状态
var state = {qs:[], ans:{}, idx:0};

// 工具函数
function shuffle(a) { var r=[...a]; for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }
function showScreen(id) { document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');}); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
function getQs() { var v=[...state.qs]; var gi=v.findIndex(function(q){return q.id==='drink_gate_q1';}); if(gi!==-1 && state.ans['drink_gate_q1']===3){v.splice(gi+1,0,SQS[1]);} return v; }

// 渲染题目
function renderQs() {
  var qs=getQs();
  var track=document.getElementById('q-track');
  track.innerHTML='';
  qs.forEach(function(q,i){
    var html='<div class="question-slide"><div class="q-num">第'+(i+1)+'题'+(q.sp?'(补充)':'')+'</div><div class="q-text">'+q.text+'</div>';
    q.opts.forEach(function(o,j){
      var sel = state.ans[q.id]===o.v ? ' on' : '';
      html+='<div class="option'+sel+'" data-qid="'+q.id+'" data-v="'+o.v+'"><div class="opt-code">'+['A','B','C','D'][j]+'</div><div class="opt-text">'+o.l+'</div></div>';
    });
    html+='</div>';
    track.innerHTML+=html;
  });
  updatePos();
}

// 渲染导航点
function renderDots() {
  var qs=getQs();
  var dots=document.getElementById('dots');
  dots.innerHTML='';
  qs.forEach(function(q,i){
    var c='dot'; if(i===state.idx) c+=' current'; if(state.ans[q.id]!==undefined) c+=' done';
    dots.innerHTML+='<div class="'+c+'" data-idx="'+i+'"></div>';
  });
}

// 更新位置
function updatePos() { document.getElementById('q-track').style.transform='translateX(-'+(state.idx*100)+'%)'; }

// 更新导航
function updateNav() {
  var qs=getQs();
  document.getElementById('btn-prev').disabled=state.idx===0;
  document.getElementById('btn-next').disabled=state.idx>=qs.length-1;
}

// 更新进度
function updateProg() {
  var qs=getQs();
  var done=qs.filter(function(q){return state.ans[q.id]!==undefined;}).length;
  var pct=qs.length?(done/qs.length)*100:0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=done+' / '+qs.length;
  document.getElementById('btn-submit').disabled=done<qs.length;
  document.getElementById('hint').textContent=done===qs.length?'完成！点击查看结果':'选择后自动跳转';
}

// 跳转题目
function goTo(i) { var qs=getQs(); if(i>=0 && i<qs.length){state.idx=i; updatePos(); updateNav(); updateProg(); renderDots();} }

// 计算结果
function score2lv(s){return s<=3?'L':(s===4?'M':'H');}
function lv2n(l){return{L:1,M:2,H:3}[l];}
function parsePat(p){return p.replace(/-/g,'').split('');}

function calcResult() {
  var scores={}; var lvs={};
  Object.keys(DIMS).forEach(function(d){scores[d]=0;});
  QS.forEach(function(q){scores[q.dim]+=Number(state.ans[q.id]||0);});
  Object.entries(scores).forEach(function(x){lvs[x[0]]=score2lv(x[1]);});
  
  var uv=DIMORDER.map(function(d){return lv2n(lvs[d]);});
  var ranked=PATTERNS.map(function(t){
    var v=parsePat(t.p).map(lv2n); var dist=0,exact=0;
    for(var i=0;i<v.length;i++){var d=Math.abs(uv[i]-v[i]);dist+=d;if(d===0)exact++;}
    var sim=Math.max(0,Math.round((1-dist/30)*100));
    return{...t,...TYPES[t.code],dist:dist,exact:exact,sim:sim};
  }).sort(function(a,b){if(a.dist!==b.dist)return a.dist-b.dist;if(b.exact!==a.exact)return b.exact-a.exact;return b.sim-a.sim;});
  
  var best=ranked[0];
  var drunk=state.ans['drink_gate_q2']===2;
  var type,badge,sp=false;
  
  if(drunk){type=TYPES.DRUNK;badge='匹配度 100% · 酒精异常因子已接管';sp=true;}
  else if(best.sim<60){type=TYPES.HHHH;badge='标准人格库最高匹配仅 '+best.sim+'%';sp=true;}
  else{type=best;badge='匹配度 '+best.sim+'% · 精准命中 '+best.exact+'/15 维';}
  
  return{scores:scores,lvs:lvs,type:type,badge:badge,sp:sp};
}

// 渲染结果
function renderRes() {
  var r=calcResult();
  var t=r.type;
  document.getElementById('r-code').textContent=t.code;
  document.getElementById('r-cn').textContent=t.cn;
  document.getElementById('r-badge').textContent=r.badge;
  document.getElementById('r-intro').textContent=t.intro;
  document.getElementById('r-desc').textContent=t.desc;
  document.getElementById('r-note').textContent=r.sp?'本测试仅供娱乐。隐藏人格和傻乐兜底都属于作者故意埋的损招。':'本测试仅供娱乐，别太当真。';
  document.getElementById('r-img').src=IMGS[t.code]||'';
  
  var dg=document.getElementById('r-dims');
  dg.innerHTML='';
  DIMORDER.forEach(function(d){
    var lv=r.lvs[d];
    dg.innerHTML+='<div class="dim-item"><div class="dim-name">'+DIMS[d]+'</div><div class="dim-score">'+lv+' / '+r.scores[d]+'分</div><div class="dim-desc">'+DIMEXP[d][lv]+'</div></div>';
  });
  showScreen('screen-result');
}

// 开始测试
function startTest() {
  state.ans={}; state.idx=0;
  var sh=shuffle(QS);
  var ins=Math.floor(Math.random()*sh.length)+1;
  state.qs=[...sh.slice(0,ins),SQS[0],...sh.slice(ins)];
  renderQs(); renderDots(); updateProg(); updateNav();
  showScreen('screen-test');
}

// 事件绑定 - 使用事件委托
document.getElementById('q-track').addEventListener('click', function(e) {
  var opt = e.target.closest('.option');
  if (!opt) return;
  
  var qid = opt.dataset.qid;
  var v = Number(opt.dataset.v);
  
  state.ans[qid] = v;
  
  // 更新样式
  var sibs = opt.parentElement.querySelectorAll('.option');
  sibs.forEach(function(s) { s.classList.remove('on'); });
  opt.classList.add('on');
  
  // 处理特殊问题
  if (qid === 'drink_gate_q1') {
    if (v !== 3) { delete state.ans['drink_gate_q2']; }
    renderQs();
    renderDots();
  }
  
  updateProg();
  updateNav();
  
  // 自动跳转
  setTimeout(function() {
    var qs = getQs();
    var idx = qs.findIndex(function(q) { return q.id === qid; });
    if (idx < qs.length - 1) { goTo(idx + 1); }
  }, 350);
});

// 导航点点击
document.getElementById('dots').addEventListener('click', function(e) {
  var dot = e.target.closest('.dot');
  if (!dot) return;
  goTo(Number(dot.dataset.idx));
});

// 按钮事件
document.getElementById('btn-start').onclick = startTest;
document.getElementById('btn-back').onclick = function() { showScreen('screen-intro'); };
document.getElementById('btn-submit').onclick = renderRes;
document.getElementById('btn-restart').onclick = startTest;
document.getElementById('btn-home').onclick = function() { showScreen('screen-intro'); };
document.getElementById('btn-prev').onclick = function() { goTo(state.idx - 1); };
document.getElementById('btn-next').onclick = function() { goTo(state.idx + 1); };
</script>
